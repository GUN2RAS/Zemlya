        def processFile = { fileToProcess ->
            String content = fileToProcess.text
            String original = content
            
            // Clean up old packages
            content = content.replaceAll("import net\\.sha\\.api\\.entity\\..*?;\\n?", "")
            
            // Process imports AND inline fully-qualified names
            importReplacements.each { key, val ->
                content = content.replaceAll(key, val)
            }
            
            // Process code
            def lines = content.split('\n')
            for (int i = 0; i < lines.length; i++) {
                String line = lines[i]
                if (!line.startsWith("package ")) {
                    codeReplacements.each { key, val ->
                        line = line.replaceAll(key, val)
                    }
                    if (line.contains("import net.minecraft.util.math.*;")) {
                        line = "import net.minecraft.core.BlockPos;\nimport net.minecraft.world.phys.Vec3;\nimport net.minecraft.world.phys.AABB;\nimport net.minecraft.core.Direction;\nimport net.minecraft.util.Mth;"
                    }
                    lines[i] = line
                }
            }
            content = lines.join('\n')
            
            if (content != original) {
                fileToProcess.text = content
                println "Remapped: ${fileToProcess.name}"
            }
        }

        [dir, clientDir].each { d ->
            if (d.exists()) {
                d.eachFileRecurse { f ->
                    if (f.name.endsWith(".java")) {
                        processFile(f)
                    }
                }
            }
        }
